  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="config.js"></script>
  <script src="translations.js"></script>
  <script src="triage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600;1,700;1,800;1,900&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #dc2626;
      --accent-2: #ef4444;
      --success: #10b981;
      --warn: #f59e0b;
      --black-tri: #1f2937;
      --hero-tint: rgba(220,38,38,0.06);
      --shadow-card: 0 1px 2px rgba(15,23,42,0.04), 0 4px 18px -8px rgba(15,23,42,0.08);
    }
    html, body, #root { height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at -10% -10%, rgba(220,38,38,0.07), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(16,185,129,0.05), transparent 60%),
        var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      font-size: 17px;
      font-family: "Inter", "Noto Sans Devanagari", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-feature-settings: "cv11", "ss01";
      letter-spacing: -0.005em;
    }
    button { -webkit-user-select: none; user-select: none; font-family: inherit; }
    .ring-progress { transition: stroke-dashoffset 1s linear; }
    .surface { background: var(--surface); border: 1px solid var(--line); }
    .surface-2 { background: var(--surface-2); border: 1px solid var(--line); }
    .divider { border-color: var(--line); }
    .text-muted { color: var(--muted); }
    .focus-ring:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
    /* subtle fade-in on screen mount */
    .screen-in { animation: fadeIn 180ms ease-out both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
    /* "live" pulse for status indicators */
    .pulse-dot { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); animation: pulse 1.6s infinite; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
      70%  { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }
    /* Buttons */
    .btn { display:flex; align-items:center; justify-content:center; gap:0.6rem;
           width:100%; min-height:64px; border-radius:14px; padding:14px 18px;
           font-weight:600; font-size:1.05rem; letter-spacing:-0.01em;
           border:1px solid transparent; transition: transform 80ms ease, background 120ms ease, border-color 120ms ease; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 24px -12px rgba(220,38,38,0.6); }
    .btn-primary:active { background: #b91c1c; }
    .btn-ghost   { background: var(--surface); color: var(--text); border-color: var(--line); }
    .btn-ghost:active { background: var(--surface-2); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-warn    { background: var(--warn); color: #1c1917; }
    .btn-danger  { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .btn-lg { min-height: 76px; font-size: 1.15rem; border-radius: 16px; }
    .btn-xl { min-height: 88px; font-size: 1.2rem; border-radius: 18px; }
    /* card */
    .card { background: var(--surface); border:1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-card); }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    /* ---- Splash animations ---- */
    .splash-wrap {
      background:
        radial-gradient(800px 400px at 50% 30%, rgba(220,38,38,0.08), transparent 60%),
        radial-gradient(600px 400px at 50% 90%, rgba(16,185,129,0.06), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, #fef7f7 100%);
    }
    .splash-mark { opacity: 0; transform: translateY(8px); animation: splashIn 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) forwards; }
    .splash-tag  { opacity: 0; animation: splashIn 0.5s 1.8s ease-out forwards; }
    .splash-skip { opacity: 0; animation: splashFade 0.6s 2.2s ease-out forwards; }
    .splash-pulse {
      stroke-dasharray: 700;
      stroke-dashoffset: 700;
      animation: splashDraw 1.4s 0.45s cubic-bezier(0.65,0,0.35,1) forwards;
    }
    .splash-dot-halo { transform-origin: 220px 76px; transform: scale(0); animation: splashHalo 0.9s 1.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .splash-dot      { transform-origin: 220px 76px; transform: scale(0); animation: splashPop  0.5s 1.65s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .splash-fade-out { animation: splashFadeOut 0.35s ease-in forwards; }
    @keyframes splashIn      { to { opacity: 1; transform: translateY(0); } }
    @keyframes splashFade    { to { opacity: 1; } }
    @keyframes splashDraw    { to { stroke-dashoffset: 0; } }
    @keyframes splashHalo    { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.6); opacity: 0.35; } 100% { transform: scale(1.2); opacity: 0.22; } }
    @keyframes splashPop     { 0% { transform: scale(0); } 70% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes splashFadeOut { to { opacity: 0; transform: scale(0.98); } }
    /* heartbeat pulse on the dot after pop */
    .splash-dot-beat { animation: splashBeat 1.2s 2.2s ease-in-out infinite; transform-origin: 220px 76px; }
    @keyframes splashBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    /* Respect reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      .splash-mark, .splash-tag, .splash-skip { opacity: 1 !important; transform: none !important; animation: none !important; }
      .splash-pulse { stroke-dashoffset: 0 !important; animation: none !important; }
      .splash-dot, .splash-dot-halo { transform: none !important; animation: none !important; }
    }

    /* Brand wordmark — italic serif for Latin, italic Tiro for Devanagari */
    .brand {
      font-family: "Playfair Display", "Tiro Devanagari Hindi", serif;
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    .brand .deva {
      font-family: "Tiro Devanagari Hindi", "Playfair Display", serif;
      font-style: italic;
    }
  </style>
</head>

<script type="text/jeevan-jsx" id="app-source">
const { useReducer, useEffect, useRef, useMemo, useCallback, useState, StrictMode } = React;

/* =========================================================

========================================================= */

/* =========================================================
   SplashScreen — animated opening, ~2.5s, tap to skip.
========================================================= */
const SplashScreen = ({ onDone, lang }) => {
  const [leaving, setLeaving] = useState(false);
  const finish = useCallback(() => {
    if (leaving) return;
    setLeaving(true);
    setTimeout(() => onDone(), 320);
  }, [leaving, onDone]);
  useEffect(() => {
    const t = setTimeout(finish, 2700);
    return () => clearTimeout(t);
  }, [finish]);
  return (
    <div className={"splash-wrap min-h-screen flex flex-col items-center justify-center px-6 " + (leaving ? "splash-fade-out" : "")}
         onClick={finish}
         role="button" aria-label="Welcome">
      <div className="w-full max-w-[460px] flex flex-col items-center">
        <svg viewBox="0 0 460 200" preserveAspectRatio="xMidYMid meet" className="w-full h-auto" aria-label="Jeevanरेखा">
          <defs>
            <linearGradient id="splash-line" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0" stopColor="#ef4444" stopOpacity="0" />
              <stop offset="0.07" stopColor="#dc2626" stopOpacity="1" />
              <stop offset="0.93" stopColor="#dc2626" stopOpacity="1" />
              <stop offset="1" stopColor="#ef4444" stopOpacity="0" />
            </linearGradient>
            <filter id="splash-glow" x="-5%" y="-30%" width="110%" height="170%">
              <feGaussianBlur stdDeviation="1.6" result="b" />
              <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          {/* Wordmark */}
          <g className="splash-mark">
            <text x="6" y="68" fontFamily="Playfair Display, serif" fontStyle="italic" fontWeight="700" fontSize="72" fill="#0f172a">Jeevan</text>
            <text x="244" y="68" fontFamily="Tiro Devanagari Hindi, serif" fontStyle="italic" fontWeight="400" fontSize="72" fill="#dc2626">रेखा</text>
          </g>
          {/* Animated ECG line */}
          <g filter="url(#splash-glow)">
            <path className="splash-pulse"
                  d="M 0 110 L 78 110 Q 88 100 98 110 L 200 110 L 208 114 L 220 76 L 232 132 L 244 90 L 256 110 L 330 110 Q 340 100 350 110 L 460 110"
                  stroke="url(#splash-line)" strokeWidth="2.6" fill="none"
                  strokeLinecap="round" strokeLinejoin="round" />
          </g>
          {/* Halo + dot popping at R-peak, then a subtle continuous heartbeat */}
          <g className="splash-dot-beat">
            <circle className="splash-dot-halo" cx="220" cy="76" r="8" fill="#dc2626" opacity="0.18" />
            <circle className="splash-dot"      cx="220" cy="76" r="3.6" fill="#dc2626" />
          </g>
        </svg>
        <div className="splash-tag mt-4 text-center">
          <div className="text-[15px] text-slate-700 font-medium">Emergency aid in your pocket</div>
          <div className="text-[12px] text-muted mt-1">Works offline · Call 108 first</div>
        </div>
      </div>
      <div className="splash-skip absolute bottom-8 text-[11px] text-muted tracking-wider uppercase">Tap to continue</div>
    </div>
  );
};

/* =========================================================
   Runtime config helpers
========================================================= */
const CFG = (typeof window !== "undefined" && window.JEEVAN_CONFIG) || {};
const FEATURE = (name) => !!(CFG.features && CFG.features[name]);

/* Clinician sign-off helpers — empty until a reviewer fills config.js */
const MR = CFG.medicalReview || {};
const isReviewerConfigured = () => !!(MR.reviewer && MR.reviewedOn);
const isProtocolReviewed = (id) => isReviewerConfigured() && (MR.reviewedProtocols || []).includes(id);
const reviewDateLabel = () => {
  if (!MR.reviewedOn) return "";
  try { return new Date(MR.reviewedOn).toLocaleDateString(undefined, { year: "numeric", month: "short" }); } catch (e) { return MR.reviewedOn; }
};

========================================================= */

  { code: "bn", label: "Bengali",  native: "বাংলা",       speech: "bn-IN" },
];
const SPEECH_CODE = Object.fromEntries(LANGS.map(l => [l.code, l.speech]));

/* =========================================================
   Voice (Web Speech API)
========================================================= */
function pickVoice(lang) {
  try {
    const voices = window.speechSynthesis.getVoices();
    const code = (SPEECH_CODE[lang] || "en-IN").toLowerCase();
    const prefix = code.split("-")[0];
    return voices.find(v => v.lang && v.lang.toLowerCase() === code)
        || voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix))
        || voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"))
        || null;
  } catch (e) { return null; }
}
function speak(text, lang, on) {
  if (!on) return;
  if (!("speechSynthesis" in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = SPEECH_CODE[lang] || "en-IN";
    u.rate = 0.95;
    u.pitch = 1.0;
    const v = pickVoice(lang);
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
function stopSpeaking() {
  try { window.speechSynthesis.cancel(); } catch (e) {}
}
/* True only when speech synthesis is loaded AND has no voice for this
   language's prefix (e.g. device lacks a Marathi/Tamil TTS pack). Returns
   false while voices are still loading so we never warn prematurely. */
function voiceUnavailableFor(lang) {
  try {
    if (!("speechSynthesis" in window)) return true;
    const voices = window.speechSynthesis.getVoices();
    if (!voices || !voices.length) return false; // not loaded yet — don't warn
    const prefix = (SPEECH_CODE[lang] || "en-IN").toLowerCase().split("-")[0];
    return !voices.some(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
  } catch (e) { return false; }
}

/* Small amber notice shown when voice is on but the device has no TTS voice
   for the chosen language — so the user knows readout fell back to text,
   instead of voice silently doing nothing. */
const VoiceFallbackNotice = ({ lang, voiceOn }) => {
  const [, force] = useState(0);
  useEffect(() => {
    if (!("speechSynthesis" in window)) return;
    const onChange = () => force(n => n + 1);
    window.speechSynthesis.addEventListener
      ? window.speechSynthesis.addEventListener("voiceschanged", onChange)
      : (window.speechSynthesis.onvoiceschanged = onChange);
    // poke once in case voices are already present
    const t = setTimeout(onChange, 400);
    return () => {
      clearTimeout(t);
      if (window.speechSynthesis.removeEventListener)
        window.speechSynthesis.removeEventListener("voiceschanged", onChange);
    };
  }, []);
  if (!voiceOn || lang === "en") return null;
  if (!voiceUnavailableFor(lang)) return null;
  const native = (LANGS.find(l => l.code === lang) || {}).native || lang;
  return (
    <div role="status" className="rounded-xl px-3 py-2 text-[13px] flex items-start gap-2"
      style={{ background: "rgba(245,158,11,0.10)", border: "1px solid rgba(245,158,11,0.35)", color: "#92400e" }}>
      <span aria-hidden="true">🔇</span>
      <span>Voice not available in {native} on this device — follow the steps on screen. (Install a {native} voice in your phone's language settings to enable readout.)</span>
    </div>
  );
};

   State store
========================================================= */
const blankAnswers = { accidentType: null, conscious: null, breathing: null, bleeding: null, neckPain: null, victimCount: null };
const STORED_LANG = (() => { try { return localStorage.getItem("fr-lang"); } catch (e) { return null; } })();
const STORED_CONSENT = (() => { try { return localStorage.getItem("fr-consented") === "1"; } catch (e) { return false; } })();
const initialState = {
  lang: STORED_LANG || "en",
  consented: STORED_CONSENT,
  splashSeen: false,
  voiceOn: true,
  screen: "home",
  answers: blankAnswers,
  triage: null,
  protocolId: null,
  stepIndex: 0,
  timeline: [],
  coords: null,
  coordsError: null,
  incidentStartedAt: null,
  outcome: null,        // { condition, helped } captured at handover (#8)
  victims: [],          // roster for multi-casualty scenes (#9)
};
function reducer(state, action) {
  switch (action.type) {
    case "SET_LANG": {
      try { localStorage.setItem("fr-lang", action.lang); } catch (e) {}
      return { ...state, lang: action.lang };
    }
    case "ACCEPT_CONSENT": {
      try { localStorage.setItem("fr-consented", "1"); } catch (e) {}
      return { ...state, consented: true };
    }
    case "SPLASH_DONE": return { ...state, splashSeen: true };
    case "SET_VOICE": return { ...state, voiceOn: action.on };
    case "GOTO": return { ...state, screen: action.screen };
    case "BEGIN_INCIDENT": return {
      ...state,
      screen: "wizard",
      answers: blankAnswers,
      triage: null,
      protocolId: null,
      stepIndex: 0,
      timeline: [],
      coords: null,
      coordsError: null,
      incidentStartedAt: Date.now(),
      outcome: null,
      // victims roster intentionally preserved so a multi-casualty scene
      // can keep assessing victim after victim without losing the list.
    };
    case "ANSWER": return { ...state, answers: { ...state.answers, [action.key]: action.value } };
    case "SET_TRIAGE": return { ...state, triage: action.triage };
    case "SET_COORDS": return { ...state, coords: action.coords, coordsError: null };
    case "SET_COORDS_ERROR": return { ...state, coordsError: action.message };
    case "START_PROTOCOL": return {
      ...state, screen: "protocol", protocolId: action.id, stepIndex: 0,
      timeline: [...state.timeline, { t: Date.now(), action: "Started: " + action.id }],
    };
    case "ADVANCE": {
      const proto = PROTOCOL_BY_ID[state.protocolId];
      if (!proto) return state;
      const nextIdx = state.stepIndex + 1;
      const stepDone = proto.steps[state.stepIndex];
      const entry = { t: Date.now(), action: "Step " + (state.stepIndex + 1) + ": " + stepDone.en };
      if (nextIdx >= proto.steps.length) {
        return { ...state, stepIndex: nextIdx, timeline: [...state.timeline, entry] };
      }
      return { ...state, stepIndex: nextIdx, timeline: [...state.timeline, entry] };
    }
    case "LOG_NOTE": return { ...state, timeline: [...state.timeline, { t: Date.now(), action: action.note }] };
    case "SET_OUTCOME": return { ...state, outcome: action.outcome };
    case "ADD_VICTIM": {
      // Snapshot the currently-assessed victim into the roster.
      if (!state.triage) return state;
      const dedupeKey = state.incidentStartedAt || Date.now();
      const without = state.victims.filter(v => v.key !== dedupeKey);
      const snapshot = {
        key: dedupeKey,
        label: action.label || ("Victim " + (without.length + 1)),
        triage: state.triage,
        protocolId: state.protocolId,
        accidentType: state.answers.accidentType,
        answers: state.answers,
        coords: state.coords,
        timeline: state.timeline,
        addedAt: Date.now(),
      };
      return { ...state, victims: [...without, snapshot] };
    }
    case "REMOVE_VICTIM": return { ...state, victims: state.victims.filter(v => v.key !== action.key) };
    case "RESUME_VICTIM": {
      const v = state.victims.find(x => x.key === action.key);
      if (!v) return state;
      return {
        ...state,
        screen: v.protocolId ? "protocol" : "triage",
        triage: v.triage,
        protocolId: v.protocolId,
        answers: v.answers || blankAnswers,
        coords: v.coords || state.coords,
        timeline: v.timeline || [],
        stepIndex: 0,
        incidentStartedAt: v.key,
        outcome: null,
      };
    }
    case "RESET_TO_HOME": return { ...initialState, lang: state.lang, voiceOn: state.voiceOn, screen: "home", victims: state.victims };
    case "CLEAR_SCENE": return { ...state, victims: [] };
    case "RETREAT": {
      if (state.stepIndex <= 0) return state;
      return { ...state, stepIndex: state.stepIndex - 1 };
    }
    default: return state;
  }
}

/* =========================================================
   Persistence  (incidents)
========================================================= */
const LS_KEY = "fr-incidents";
const DEVICE_ID_KEY = "fr-device-id";
function deviceId() {
  let id = null;
  try { id = localStorage.getItem(DEVICE_ID_KEY); } catch (e) {}
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
    try { localStorage.setItem(DEVICE_ID_KEY, id); } catch (e) {}
  }
  return id;
}
function loadIncidents() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch (e) { return []; }
}
function deleteIncident(id) {
  const list = loadIncidents().filter(r => (r.startedAt || r.id) !== id);
  try { localStorage.setItem(LS_KEY, JSON.stringify(list)); } catch (e) {}
}
function saveIncident(record) {
  const dedupeKey = record.startedAt || record.id;
  const list = loadIncidents().filter(r => (r.startedAt || r.id) !== dedupeKey);
  const stable = { ...record, id: dedupeKey };
  list.unshift(stable);
  try { localStorage.setItem(LS_KEY, JSON.stringify(list.slice(0, 50))); } catch (e) {}
  saveIncidentToCloud(stable);
}
function saveIncidentToCloud(record) {
  try {
    const client = supa();
    if (!client) return;
    const row = {
      device_id: deviceId(),
      started_at: record.startedAt ? new Date(record.startedAt).toISOString() : new Date().toISOString(),
      triage: record.triage || null,
      accident_type: record.answers?.accidentType || null,
      protocol_id: record.protocolId || null,
      coords: record.coords || null,
      answers: record.answers || null,
      timeline: record.timeline || null,
      outcome: record.outcome || null,
      victims: record.victims || null,
      text: record.text || null,
    };
    client.from("incidents").upsert(row, { onConflict: "device_id,started_at" }).then(() => {});
  } catch (e) {}
}

const VITAL_LABELS = {
  en: {
    conscious: "Consciousness", breathing: "Breathing", bleeding: "Bleeding",

    burnsExtent: "Burns", trapped: "Trapped", waterTime: "Time in water",

    poisonTimeAgo: "Time since", poisonVomiting: "Vomiting"
  },
  hi: {
    conscious: "चेतना", breathing: "साँस", bleeding: "खून",
    neckPain: "गर्दन / रीढ़", victimCount: "घायल",
    burnsExtent: "जलन", trapped: "फँसा", waterTime: "पानी में समय",
    dovedIn: "कूदा", stillLive: "बिजली में", electricBurns: "बिजली जलन",
    medSymptom: "लक्षण", biteSource: "किसने काटा", biteSwelling: "सूजन तेज़",
    biteAllergy: "एलर्जी", poisonType: "पदार्थ",
    poisonTimeAgo: "कितनी देर पहले", poisonVomiting: "उल्टी"
  }
};
function vitalsList(a, lang) {
  const labels = VITAL_LABELS[lang] || VITAL_LABELS.en;
  const out = [];
  for (const k of Object.keys(labels)) {
    const v = a[k];
    if (v === null || v === undefined) continue;
    // Translate the value via labelKey on the question option, if available.
    const q = QUESTIONS[k];
    let pretty = v;
    if (q && q.options) {
      const opt = q.options.find(o => o.value === v);
      if (opt && opt.labelKey) pretty = t(lang, opt.labelKey);
    }
    out.push({ label: labels[k], value: pretty });
  }
  return out;
}

/* Per-type question sequence after accident type is chosen. */
const TYPE_FLOWS = {
  road:     ["conscious", "breathing", "bleeding", "neckPain", "victimCount"],
  fire:     ["conscious", "breathing", "burnsExtent", "trapped", "victimCount"],
  water:    ["conscious", "breathing", "waterTime", "dovedIn", "victimCount"],
  fall:     ["conscious", "breathing", "bleeding", "neckPain", "victimCount"],
  electric: ["stillLive", "conscious", "breathing", "electricBurns"],
  medical:  ["conscious", "breathing", "medSymptom"],
  bite:     ["conscious", "biteSource", "biteSwelling", "biteAllergy"],
  poison:   ["conscious", "breathing", "poisonType", "poisonTimeAgo", "poisonVomiting"],
  other:    ["conscious", "breathing", "bleeding", "neckPain", "victimCount"],
};

const WizardScreen = ({ state, dispatch }) => {
  const tt = (k, v) => t(state.lang, k, v);
  const a = state.answers;

  // Build the ordered list of questions for THIS incident.
  // Always starts with accidentType, then the type-specific flow.
  const sequence = useMemo(() => {
    if (!a.accidentType) return [{ key: "accidentType", question: { qKey: "q_type", layout: "grid",
      options: ACCIDENT_TYPES.map(at => ({ value: at.id, label: at, kind: "ghost" })) } }];
    const flow = TYPE_FLOWS[a.accidentType] || TYPE_FLOWS.other;
    return [
      { key: "accidentType", question: { qKey: "q_type", layout: "grid",
        options: ACCIDENT_TYPES.map(at => ({ value: at.id, label: at, kind: "ghost" })) } },
      ...flow.map(k => ({ key: k, question: QUESTIONS[k] })),
    ];
  }, [a.accidentType]);

  const idx = sequence.findIndex(s => a[s.key] == null);
  const node = idx === -1 ? null : sequence[idx];
  const step = node ? { key: node.key, ...node.question } : null;

  useEffect(() => {
    if (step) speak(tt(step.qKey), state.lang, state.voiceOn);
    return stopSpeaking;
  }, [idx, state.lang, state.voiceOn]);

  useEffect(() => {
    if (idx === -1) {
      const tri = triageOf(a);
      dispatch({ type: "SET_TRIAGE", triage: tri });
      dispatch({ type: "GOTO", screen: "triage" });
    }
  }, [idx]);

  if (!step) return null;
  const goBack = () => {
    if (idx === 0) { dispatch({ type: "GOTO", screen: "home" }); return; }
    const prevKey = sequence[idx - 1].key;
    dispatch({ type: "ANSWER", key: prevKey, value: null });
  };

  const pct = ((idx) / sequence.length) * 100;

  return (
    <div className="screen-in p-4 max-w-screen-sm mx-auto flex flex-col" style={{minHeight: "calc(100vh - 60px)"}}>
      {/* Progress */}
      <div className="flex items-center justify-between text-[12px] text-muted mb-2">
        <span className="font-semibold tracking-wider uppercase">{tt("stepOf", {n: idx + 1, total: sequence.length})}</span>
        <span>{Math.round(pct)}%</span>
      </div>
      <div className="h-1.5 rounded-full bg-[color:var(--surface-2)] overflow-hidden mb-5">
        <div className="h-full rounded-full transition-all" style={{ width: pct + "%", background: "linear-gradient(90deg,#dc2626,#ef4444)" }} />
      </div>

      {/* Question card */}
      <div className="card p-5 mb-4">
        <SectionLabel>Question</SectionLabel>
        <div className="mt-2 text-[22px] leading-snug font-semibold tracking-tight">{tt(step.qKey)}</div>
      </div>

      {/* Answers */}
      {step.layout === "grid" ? (
        <div className="grid grid-cols-2 gap-2.5">
          {step.options.map(opt => (
            <button key={opt.value}
                    onClick={() => dispatch({ type: "ANSWER", key: step.key, value: opt.value })}
                    className="card focus-ring px-3 py-4 text-left active:bg-[color:var(--surface-2)]">
              <div className="text-[15px] font-semibold tracking-tight leading-tight">
                {opt.label ? opt.label[state.lang] : tt(opt.labelKey)}
              </div>
            </button>
          ))}
        </div>
      ) : (
        <div className="flex-1 flex flex-col justify-center space-y-3">
          {step.options.map(opt => (
            <Button key={opt.value} kind={opt.kind} size="xl"
                    onClick={() => dispatch({ type: "ANSWER", key: step.key, value: opt.value })}>
              {tt(opt.labelKey)}
            </Button>
          ))}
        </div>
      )}

      {/* Back */}
      <button onClick={goBack} className="mt-5 inline-flex items-center gap-2 text-muted hover:text-slate-900 self-start px-2 py-2 focus-ring rounded-lg">
        <Icon.Back size={18} /> {tt("back")}
      </button>
    </div>
  );
};

/* =========================================================
   Protocol Runner
========================================================= */
const ProtocolScreen = ({ state, dispatch }) => {
  const tt = (k, v) => t(state.lang, k, v);
  const proto = PROTOCOL_BY_ID[state.protocolId];
  const finished = state.stepIndex >= proto.steps.length;
  const step = finished ? null : proto.steps[state.stepIndex];

  useEffect(() => {
    let lock = null;
    if (navigator.wakeLock) {
      navigator.wakeLock.request("screen").then(l => { lock = l; }).catch(() => {});
    }
    return () => { if (lock) lock.release().catch(() => {}); };
  }, []);

  const [remaining, setRemaining] = useState(step ? step.seconds : 0);
  useEffect(() => {
    if (!step) return;
    setRemaining(step.seconds);
    speak(step[state.lang] || step.en, state.lang, state.voiceOn);
    return stopSpeaking;
  }, [state.stepIndex, state.lang, state.voiceOn, state.protocolId]);

  useEffect(() => {
    if (!step) return;
    if (remaining <= 0) return;
    const id = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(id);
  }, [remaining, step]);

  useEffect(() => {
    if (!step) return;
    if (remaining === 0) {
      const delay = state.voiceOn ? 700 : 1500;
      const tm = setTimeout(() => dispatch({ type: "ADVANCE" }), delay);
      return () => clearTimeout(tm);
    }
  }, [remaining, state.voiceOn, step]);

  // Auto-save the moment the protocol completes, so the incident appears in
  // "Past incidents" without the user having to navigate to Handover.
  // Idempotent (saveIncident dedupes by startedAt) so re-saving from Handover is fine.
  useEffect(() => {
    if (!finished) return;
    try {
      saveIncident({
        id: state.incidentStartedAt || Date.now(),
        startedAt: state.incidentStartedAt,
        triage: state.triage,
        protocolId: state.protocolId,
        answers: state.answers,
        coords: state.coords,
        timeline: state.timeline,
        outcome: state.outcome,
        victims: state.victims,
        text: buildHandoverText(state),
        autoSavedAt: Date.now(),
      });
    } catch (e) { /* localStorage may be unavailable in some sandboxes */ }
  }, [finished]);

  if (finished) {
    return (
      <div className="screen-in p-4 max-w-screen-sm mx-auto space-y-4">
        <div className="card p-6 text-center" style={{ background: "linear-gradient(135deg,#064e3b,#10b981)", borderColor: "transparent" }}>
          <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/15 mb-2">
            <Icon.Check size={26} className="text-white" />
          </div>
          <div className="text-[22px] font-bold tracking-tight">{tt("done")}</div>
          <div className="text-[13px] opacity-90 mt-1">Protocol complete · logged to Past incidents</div>
        </div>
        <Button onClick={() => dispatch({ type: "GOTO", screen: "handover" })} kind="primary" size="xl"
                leftIcon={<Icon.Stethoscope size={20} />}>{tt("paramedicArrived")}</Button>
        <Button onClick={() => dispatch({ type: "GOTO", screen: "alert" })} kind="warn" size="lg"
                leftIcon={<Icon.Phone size={20} />}>{tt("sendAlert")}</Button>
        <Button onClick={() => dispatch({ type: "GOTO", screen: "library" })} kind="ghost" size="lg"
                leftIcon={<Icon.Library size={18} />}>{tt("btnLibrary")}</Button>
      </div>
    );
  }

  const total = step.seconds || 1;
  const pct = Math.max(0, Math.min(1, remaining / total));
  const circ = 2 * Math.PI * 44;
  const offset = circ * (1 - pct);
  const stepPct = ((state.stepIndex) / proto.steps.length) * 100;

  return (
    <div className="screen-in max-w-screen-sm mx-auto flex flex-col" style={{minHeight: "calc(100vh - 60px)"}}>
      {/* Step header */}
      <div className="px-4 pt-3 pb-2">
        <div className="flex items-center justify-between gap-2 mb-2 flex-wrap">
          <div className="flex items-center gap-2 flex-wrap">
            <TriagePill tri={proto.triage} />
            <ReviewBadge protocolId={proto.id} />
          </div>
          <span className="text-[12px] text-muted font-semibold tracking-wider uppercase">{tt("stepOf", {n: state.stepIndex + 1, total: proto.steps.length})}</span>
        </div>
        <div className="h-1 rounded-full bg-[color:var(--surface-2)] overflow-hidden">
          <div className="h-full transition-all" style={{ width: stepPct + "%", background: "linear-gradient(90deg,#dc2626,#ef4444)" }} />
        </div>

function buildAlertText(state) {
  const a = state.answers;
  const tri = state.triage || "?";
  const coordPart = state.coords
    ? "https://maps.google.com/?q=" + state.coords.lat.toFixed(6) + "," + state.coords.lng.toFixed(6)
    : "location not available";
  const victims = a.victimCount === "many" ? "5+" : a.victimCount === "few" ? "2-4" : (a.victimCount === "one" ? "1" : "?");
  const inj = [];
  if (a.conscious === "no") inj.push("unconscious");
  if (a.breathing === "no") inj.push("not breathing");
  if (a.bleeding === "severe") inj.push("severe bleeding");
  else if (a.bleeding === "moderate") inj.push("bleeding");
  if (a.neckPain === "yes") inj.push("possible spine injury");
  if (a.burnsExtent === "large") inj.push("large burns");
  else if (a.burnsExtent === "small") inj.push("small burns");
  if (a.trapped === "yes") inj.push("trapped");
  if (a.stillLive === "yes") inj.push("still on live current");
  if (a.electricBurns === "yes") inj.push("electric burns");
  if (a.dovedIn === "yes") inj.push("dove in head-first, spine risk");
  if (a.waterTime === "long") inj.push("over a minute in water");
  if (a.biteSource) inj.push("bite: " + a.biteSource);
  if (a.biteSwelling === "yes") inj.push("rapid swelling");
  if (a.biteAllergy === "yes") inj.push("allergic reaction");
  if (a.medSymptom) inj.push("symptom: " + a.medSymptom);
  if (a.poisonType) inj.push("poison: " + a.poisonType);
  if (a.poisonTimeAgo === "under1h") inj.push("within last hour");
  if (a.poisonVomiting === "yes") inj.push("vomiting");
  const injStr = inj.length ? inj.join(", ") : "details unclear";
  const at = ACCIDENT_TYPES.find(x => x.id === a.accidentType);
  const typeStr = at ? at.en : "Incident";
  return typeStr + ". " + coordPart + ". Victims: " + victims + ". Triage: " + tri + ". " + injStr + ". Bystander first aid in progress.";
}

/* =========================================================

========================================================= */
function buildHandoverText(state) {
  const a = state.answers;
  const start = state.incidentStartedAt ? new Date(state.incidentStartedAt) : new Date();
  const lines = [];
  const at = ACCIDENT_TYPES.find(x => x.id === a.accidentType);
  lines.push("PARAMEDIC HANDOVER");
  lines.push("Type: " + (at ? at.en : "Unknown"));
  lines.push("Incident start: " + start.toLocaleString());
  lines.push("Triage: " + (state.triage || "?"));
  lines.push("Location: " + (state.coords ? state.coords.lat.toFixed(6) + ", " + state.coords.lng.toFixed(6) : "unknown"));
  lines.push("Victims: " + (a.victimCount || "?"));
  lines.push("Conscious: " + (a.conscious || "?") + " | Breathing: " + (a.breathing || "?") + " | Bleeding: " + (a.bleeding || "?") + " | Spine: " + (a.neckPain || "?"));
  if (state.outcome && (state.outcome.condition || state.outcome.helped)) {
    lines.push("Outcome at handover: " + (state.outcome.condition || "?") +
      (state.outcome.helped ? " | First-aid helped: " + state.outcome.helped : ""));
  }
  if (state.victims && state.victims.length) {
    const counts = state.victims.reduce((m, v) => { m[v.triage] = (m[v.triage] || 0) + 1; return m; }, {});
    lines.push("Scene roster: " + state.victims.length + " tracked (" +
      ["RED", "YELLOW", "GREEN", "BLACK"].filter(k => counts[k]).map(k => counts[k] + " " + k).join(", ") + ")");
  }
  lines.push("");
  lines.push("Interventions:");
  state.timeline.forEach((entry, i) => {
    const ts = new Date(entry.t);
    const hh = String(ts.getHours()).padStart(2, "0");
    const mm = String(ts.getMinutes()).padStart(2, "0");
    const ss = String(ts.getSeconds()).padStart(2, "0");
    lines.push("  " + (i + 1) + ". [" + hh + ":" + mm + ":" + ss + "] " + entry.action);
  });
  return lines.join("\n");
}

/* ---------- Online / offline status ---------- */
function useOnlineStatus() {
  const [online, setOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);
  useEffect(() => {
    const up = () => setOnline(true);
    const down = () => setOnline(false);
    window.addEventListener("online", up);
    window.addEventListener("offline", down);
    return () => { window.removeEventListener("online", up); window.removeEventListener("offline", down); };
  }, []);
  return online;
}
const OnlineChip = () => {
  const online = useOnlineStatus();
  return (
    <span className={"inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-bold tracking-wider uppercase border " +
      (online ? "bg-emerald-50 border-emerald-200 text-emerald-700" : "bg-amber-50 border-amber-200 text-amber-700")}>
      <span className="w-1.5 h-1.5 rounded-full" style={{ background: online ? "#10b981" : "#f59e0b" }} />
      {online ? "Online" : "Offline · SMS only"}
    </span>
  );
};

/* Try the Web Share API (which routes to any installed app — SMS works offline).
   Returns true if a sheet opened, false if not supported. */
async function tryNativeShare(text, title) {
  if (!navigator.share) return false;
  try { await navigator.share({ text, title: title || "Emergency alert" }); return true; }
  catch (e) { return false; }
}

/* ---------- Haversine + distance helpers ---------- */
const haversineKm = (a, b) => {
  if (!a || !b) return Infinity;
  const R = 6371;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
};
const kmLabel = (km) => km < 1 ? Math.round(km * 1000) + " m" : km.toFixed(1) + " km";
const minsAgo = (ms) => Math.max(0, Math.round((Date.now() - ms) / 60000));

/* ---------- Network resilience: timeout + retry with backoff ----------
   India's mobile networks are patchy. A single dropped fetch must not
   silently lose the hospital list or geocode — retry a few times with
   exponential backoff and a hard per-attempt timeout (AbortController). */
async function fetchWithRetry(url, opts = {}, { tries = 3, timeout = 8000, backoff = 600 } = {}) {
  let lastErr;
  for (let attempt = 0; attempt < tries; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeout);
    try {
      const res = await fetch(url, { ...opts, signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res;
    } catch (err) {
      clearTimeout(timer);
      lastErr = err;
      // Don't bother retrying if the browser knows it's offline.
      if (typeof navigator !== "undefined" && navigator.onLine === false) break;
      if (attempt < tries - 1) {
        await new Promise(r => setTimeout(r, backoff * Math.pow(2, attempt)));
      }
    }
  }
  throw lastErr;
}

/* ---------- Hospital finder (OpenStreetMap Overpass) ---------- */
const HOSPITAL_CACHE_KEY = "fr-hospitals";
async function fetchNearbyHospitals(lat, lng, radiusMeters = 5000) {
  // Overpass API. CORS-enabled. Free. Returns hospitals as nodes/ways/relations.
  const q = `[out:json][timeout:8];(node["amenity"="hospital"](around:${radiusMeters},${lat},${lng});way["amenity"="hospital"](around:${radiusMeters},${lat},${lng});relation["amenity"="hospital"](around:${radiusMeters},${lat},${lng}););out center 12;`;
  const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q);
  const res = await fetchWithRetry(url, {}, { tries: 3, timeout: 9000 });
  const data = await res.json();
  const items = (data.elements || []).map(el => {
    const c = el.type === "node" ? { lat: el.lat, lng: el.lon } : (el.center ? { lat: el.center.lat, lng: el.center.lon } : null);
    if (!c) return null;
    const tags = el.tags || {};
    return {
      id: el.type + "/" + el.id,
      name: tags.name || tags["name:en"] || "Hospital",
      phone: tags.phone || tags["contact:phone"] || null,
      emergency: tags.emergency || null,
      openingHours: tags.opening_hours || null,
      lat: c.lat, lng: c.lng,
      distanceKm: haversineKm({lat, lng}, c),
    };
  }).filter(Boolean);
  items.sort((a, b) => a.distanceKm - b.distanceKm);
  return items.slice(0, 3);
}
function cacheHospitals(coords, list) {
  try { localStorage.setItem(HOSPITAL_CACHE_KEY, JSON.stringify({ coords, list, at: Date.now() })); } catch (e) {}
}
function readCachedHospitals() {
  try { return JSON.parse(localStorage.getItem(HOSPITAL_CACHE_KEY) || "null"); } catch (e) { return null; }
}

const HospitalsCard = ({ coords, lang }) => {
  if (!FEATURE("hospitalFinder")) return null;
  const [state, setState] = useState({ loading: false, hospitals: [], cached: null, error: null });
  useEffect(() => {
    const cached = readCachedHospitals();
    if (cached) setState(s => ({ ...s, cached }));
    if (!coords) return;
    let alive = true;
    setState(s => ({ ...s, loading: true, error: null }));
    fetchNearbyHospitals(coords.lat, coords.lng)
      .then(list => {
        if (!alive) return;
        cacheHospitals(coords, list);
        setState({ loading: false, hospitals: list, cached: { coords, list, at: Date.now() }, error: null });
      })
      .catch(err => { if (alive) setState(s => ({ ...s, loading: false, error: String(err.message || err) })); });
    return () => { alive = false; };
  }, [coords && coords.lat, coords && coords.lng]);

  const showing = state.hospitals.length ? state.hospitals : (state.cached ? state.cached.list : []);
  const stale = !state.hospitals.length && state.cached;

  return (
    <div className="card p-4">
      <div className="flex items-center justify-between mb-2">
        <SectionLabel>Nearest hospitals</SectionLabel>
        {state.loading && <span className="text-[11px] text-muted">searching…</span>}
        {stale && <span className="text-[11px] text-amber-600">cached · {minsAgo(state.cached.at)} min ago</span>}
      </div>
      {!coords && !showing.length && <div className="text-[13px] text-muted">Waiting for GPS…</div>}
      {!showing.length && !state.loading && coords && <div className="text-[13px] text-muted">No hospitals found within 5 km.</div>}
      <div className="space-y-2">
        {showing.slice(0, 3).map(h => {
          const mapsUrl = "https://www.google.com/maps/dir/?api=1&destination=" + h.lat + "," + h.lng;
          return (
            <div key={h.id} className="surface-2 rounded-xl p-3 flex items-center gap-2">
              <div className="flex-1 min-w-0">
                <div className="text-[14px] font-semibold truncate">{h.name}</div>
                <div className="text-[12px] text-muted">{kmLabel(h.distanceKm)}{h.emergency === "yes" ? " · 24×7 emergency" : (h.openingHours ? " · " + h.openingHours : "")}</div>
              </div>
              {h.phone && <a href={"tel:" + h.phone.replace(/\s+/g,'')} className="w-9 h-9 inline-flex items-center justify-center rounded-lg bg-red-600 text-white"><Icon.Phone size={16} /></a>}
              <a href={mapsUrl} target="_blank" rel="noopener" className="w-9 h-9 inline-flex items-center justify-center rounded-lg bg-emerald-600 text-white"><Icon.Pin size={16} /></a>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* Shown after registration — lets the volunteer toggle availability or delete. */
const VolunteerSelf = ({ state, dispatch, self }) => {
  const [available, setAvailable] = useState(!!self.available);
  const [status, setStatus] = useState("");
  const [deleting, setDeleting] = useState(false);

  const toggleAvailability = async (next) => {
    setAvailable(next);
    const client = supa();
    if (!client) { setStatus("Saved locally only — Supabase not configured."); return; }
    setStatus("Updating…");
    try {
      const { error } = await client.from("volunteers").update({ available: next, last_active: new Date().toISOString() }).eq("phone", self.phone);
      if (error) throw error;
      const updated = { ...self, available: next };
      writeVolunteerSelf(updated);
      setStatus(next ? "Available right now." : "Marked unavailable.");
    } catch (e) { setStatus("Failed: " + (e.message || e)); }
  };

  const deleteMe = async () => {
    if (!confirm("Delete your volunteer registration? This removes your name, phone, location and skills from the database. You can re-register at any time.")) return;
    setDeleting(true);
    setStatus("Deleting…");
    const client = supa();
    if (!client) { clearVolunteerSelf(); setStatus("Cleared from this device. Supabase not configured — server data unchanged."); setDeleting(false); return; }
    try {
      const { error } = await client.from("volunteers").delete().eq("phone", self.phone);
      if (error) throw error;
      clearVolunteerSelf();
      setStatus("Deleted. Thank you.");
      setTimeout(() => dispatch({ type: "GOTO", screen: "home" }), 800);
    } catch (e) {
      // If RLS blocks delete, at least scrub local copy and tell the user
      if (e.code === "42501" || /policy/i.test(e.message || "")) {
        clearVolunteerSelf();
        setStatus("Removed from this device. Server delete blocked — ask the project admin to run the volunteer-delete SQL policy.");
      } else {
        setStatus("Failed: " + (e.message || e));
      }
      setDeleting(false);
    }
  };

  return (
    <div className="screen-in p-4 max-w-screen-sm mx-auto space-y-4">
      <h2 className="text-[22px] font-bold tracking-tight">Your volunteer registration</h2>
      <p className="text-[13px] text-muted">You're registered. You can change availability or delete your data here.</p>
      <div className="card p-4 space-y-2">
        <div><span className="text-[11px] text-muted uppercase tracking-wider">Name</span><div className="text-[15px] font-semibold">{self.name}</div></div>
        <div><span className="text-[11px] text-muted uppercase tracking-wider">Phone</span><div className="text-[15px] font-semibold tabular-nums">{self.phone}</div></div>
        <div><span className="text-[11px] text-muted uppercase tracking-wider">Skills</span><div className="text-[14px]">{(self.skills || []).join(" · ") || "—"}</div></div>
        <div><span className="text-[11px] text-muted uppercase tracking-wider">Location</span><div className="text-[13px] tabular-nums">{self.lat ? self.lat.toFixed(5) + ", " + self.lng.toFixed(5) : "—"}</div></div>
      </div>

      <div className="card p-4">
        <SectionLabel>Availability</SectionLabel>
        <label className="flex items-center justify-between mt-3 cursor-pointer">
          <span className="text-[14px] font-medium">{available ? "Available — visible to nearby emergencies" : "Unavailable — hidden from nearby emergencies"}</span>
          <input type="checkbox" checked={available} onChange={e => toggleAvailability(e.target.checked)} className="w-5 h-5" />
        </label>
      </div>

      <div className="card p-4" style={{ borderColor: "#fecaca", background: "#fef2f2" }}>
        <div className="flex items-center gap-2 mb-2">
          <span className="w-7 h-7 rounded-md bg-red-100 border border-red-200 text-red-700 inline-flex items-center justify-center"><Icon.Warn size={16} /></span>
          <SectionLabel>Delete my registration</SectionLabel>
        </div>
        <p className="text-[13px] text-red-900 mb-3">Permanently removes your name, phone, GPS and skills from the database. You can re-register at any time.</p>
        <Button onClick={deleteMe} kind="danger" size="lg" leftIcon={<Icon.Warn size={18} />}>
          {deleting ? "Deleting…" : "Delete my data"}
        </Button>
      </div>

      {status && <div className="text-[13px] text-muted text-center">{status}</div>}
    </div>
  );
};

/* ---------- Volunteer near-me display (during incident) ---------- */
const VolunteersNearby = ({ state }) => {
  if (!FEATURE("volunteerNetwork")) return null;
  if (!state.coords) return null;
  const [items, setItems] = useState([]);
  const [status, setStatus] = useState("loading");
  useEffect(() => {
    const client = supa();
    if (!client) { setStatus("unconfigured"); return; }
    let alive = true;
    (async () => {
      try {
        const { data, error } = await client.from("volunteers").select("*").eq("available", true).limit(100);
        if (error) throw error;
        const here = data || [];
        const withDist = here.map(v => ({ ...v, distanceKm: haversineKm(state.coords, { lat: v.lat, lng: v.lng }) }))
          .filter(v => isFinite(v.distanceKm) && v.distanceKm <= 1.5)
          .sort((a, b) => a.distanceKm - b.distanceKm);
        if (alive) { setItems(withDist); setStatus(withDist.length ? "ok" : "none"); }
      } catch (e) { if (alive) setStatus("error:" + (e.message || e)); }
    })();
    return () => { alive = false; };
  }, [state.coords && state.coords.lat, state.coords && state.coords.lng]);

  if (status === "unconfigured") return null;
  return (
    <div className="card p-4">
      <SectionLabel>Volunteers within 1.5 km</SectionLabel>
      {status === "loading" && <div className="text-[13px] text-muted mt-2">Looking…</div>}
      {status === "none" && <div className="text-[13px] text-muted mt-2">No volunteers nearby right now.</div>}
      {status.startsWith("error") && <div className="text-[13px] text-amber-700 mt-2">{status}</div>}
      <div className="mt-2 space-y-2">
        {items.map(v => {
          const coordsPart = state.coords
            ? "https://maps.google.com/?q=" + state.coords.lat.toFixed(6) + "," + state.coords.lng.toFixed(6)
            : "see GPS";
          const msg = "EMERGENCY: Road accident at " + coordsPart + ". You are " + kmLabel(v.distanceKm) + " away. Can you help? Reply to confirm.";
          const cleanPhone = (v.phone || "").replace(/[^0-9+]/g,"");
          const wa = "https://wa.me/" + cleanPhone.replace(/[^0-9]/g,"") + "?text=" + encodeURIComponent(msg);
          const sms = "sms:" + cleanPhone + "?body=" + encodeURIComponent(msg);
          const tel = "tel:" + cleanPhone;
          return (
            <VolunteerRow key={v.id || v.phone} v={v} tel={tel} sms={sms} wa={wa} />
          );
        })}
      </div>
    </div>
  );
};

/* ---------- Reverse geocode via Nominatim ---------- */
async function reverseGeocode(lat, lng) {
  try {
    const url = "https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lng + "&zoom=18&addressdetails=1";
    const res = await fetchWithRetry(url, { headers: { "Accept": "application/json" } }, { tries: 2, timeout: 8000 });
    const d = await res.json();
    return d.display_name || null;
  } catch (e) { return null; }
}

/* ---------- Incident Report ---------- */
const IncidentReport = ({ state }) => {
  if (!FEATURE("incidentReport")) return null;
  const [address, setAddress] = useState("");
  useEffect(() => {
    if (!state.coords) return;
    let alive = true;
    reverseGeocode(state.coords.lat, state.coords.lng).then(a => { if (alive && a) setAddress(a); });
    return () => { alive = false; };
  }, [state.coords && state.coords.lat]);

  const a = state.answers;
  const at = ACCIDENT_TYPES.find(x => x.id === a.accidentType);
  const lines = [];
  lines.push("JEEVANREKHA — INCIDENT REPORT");
  lines.push("Generated: " + new Date().toLocaleString());
  lines.push("Type: " + (at ? at.en : "Unknown"));
  lines.push("Started: " + (state.incidentStartedAt ? new Date(state.incidentStartedAt).toLocaleString() : "—"));
  lines.push("Triage: " + (state.triage || "—"));
  lines.push("GPS: " + (state.coords ? state.coords.lat.toFixed(6) + ", " + state.coords.lng.toFixed(6) : "unknown"));
  lines.push("Address: " + (address || "(reverse geocode pending)"));
  lines.push("Victims: " + (a.victimCount || "—"));
  lines.push("");
  lines.push("Initial assessment:");
  vitalsList(a, "en").forEach(v => lines.push("  - " + v.label + ": " + v.value));
  lines.push("");
  lines.push("Interventions:");
  state.timeline.forEach((e, i) => lines.push("  " + (i + 1) + ". " + new Date(e.t).toLocaleTimeString() + " — " + e.action));
  const text = lines.join("\n");

  const copy = async () => { try { await navigator.clipboard.writeText(text); } catch (e) {} };
  const printIt = () => {
    const w = window.open("", "_blank");

    w.document.close();
    setTimeout(() => w.print(), 250);
  };
  return (
    <div className="card p-4 space-y-3">
      <SectionLabel>Incident report</SectionLabel>
      <pre className="surface-2 rounded-lg p-3 text-[12px] leading-relaxed whitespace-pre-wrap break-words text-slate-700 font-mono max-h-[260px] overflow-auto">{text}</pre>
      <div className="grid grid-cols-2 gap-3">
        <Button onClick={printIt} kind="ghost" size="md" leftIcon={<Icon.Library size={18} />}>Print / save PDF</Button>
        <Button onClick={copy} kind="ghost" size="md" leftIcon={<Icon.Copy size={18} />}>Copy text</Button>

/* =========================================================
   Error boundary — last line of defence so a render crash never
   leaves the screen blank. Bystanders mid-incident always see a
   way to reach emergency services even if the UI itself broke.
========================================================= */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    try { console.error("Jeevanरेखा crashed:", error, info); } catch (e) {}
  }
  handleReload() {
    try { localStorage.removeItem("fr-screen-state"); } catch (e) {}
    window.location.reload();
  }
  render() {
    if (!this.state.error) return this.props.children;
    const msg = (this.state.error && this.state.error.message) || String(this.state.error);
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: "2rem", textAlign: "center",
        background: "#fff", color: "#0f172a", gap: "1rem" }}>
        <div style={{ fontSize: "3rem" }}>⚠️</div>
        <h1 style={{ fontSize: "1.5rem", fontWeight: 800, color: "#b91c1c" }}>
          The app hit a problem — but you still need help.
        </h1>
        <p style={{ maxWidth: "32rem", color: "#475569" }}>
          Call for an ambulance right now, then try reloading the app.
        </p>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", justifyContent: "center" }}>
          <a href="tel:108" style={{ background: "#dc2626", color: "#fff", padding: "0.9rem 1.5rem",
            borderRadius: "0.75rem", fontWeight: 700, textDecoration: "none", fontSize: "1.1rem" }}>
            Call 108
          </a>
          <a href="tel:112" style={{ background: "#1f2937", color: "#fff", padding: "0.9rem 1.5rem",
            borderRadius: "0.75rem", fontWeight: 700, textDecoration: "none", fontSize: "1.1rem" }}>
            Call 112
          </a>
          <button onClick={() => this.handleReload()} style={{ background: "#f1f5f9", color: "#0f172a",
            padding: "0.9rem 1.5rem", borderRadius: "0.75rem", fontWeight: 700, border: "1px solid #e2e8f0",
            fontSize: "1.1rem", cursor: "pointer" }}>
            Reload app
          </button>
        </div>
        <pre style={{ marginTop: "1.5rem", maxWidth: "32rem", fontSize: "0.75rem", color: "#94a3b8",
          whiteSpace: "pre-wrap", textAlign: "left" }}>{msg}</pre>
      </div>
    );
  }
}

/* =========================================================
   App root
========================================================= */
function App() {
  const [state, dispatch] = useReducer(reducer, initialState);

  // load voices once (some browsers populate async)
  useEffect(() => {
    if (!("speechSynthesis" in window)) return;
    const warm = () => window.speechSynthesis.getVoices();
    warm();
    window.speechSynthesis.onvoiceschanged = warm;
  }, []);

  // service worker
  useEffect(() => {
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  }, []);

  const titleByScreen = {
    home: t(state.lang, "appTitle"),
    wizard: t(state.lang, "btnStart"),
    triage: t(state.lang, "triage_subtitle"),
    protocol: PROTOCOL_BY_ID[state.protocolId] ? (PROTOCOL_BY_ID[state.protocolId].title[state.lang] || PROTOCOL_BY_ID[state.protocolId].title.en) : "",
    alert: t(state.lang, "alertTitle"),
    handover: t(state.lang, "handoverTitle"),
    library: t(state.lang, "library"),
    log: t(state.lang, "incidentLog"),
    victims: "Scene roster",
    about: t(state.lang, "aboutTitle"),
    language: "Language",
    volunteer: "Volunteer network",
    "volunteer-register": "Register as volunteer",
  };

  // Animated splash on every launch (one-tap skip + auto-advance).
  if (!state.splashSeen) {
    return (
      <SplashScreen lang={state.lang} onDone={() => dispatch({ type: "SPLASH_DONE" })} />
    );
  }

  // Block everything until the first-launch consent is accepted.
  if (!state.consented) {
    return (
      <div className="min-h-screen flex flex-col">
        <ConsentScreen state={state} dispatch={dispatch} />
      </div>
    );
  }

  let body = null;
  switch (state.screen) {
    case "home":     body = <HomeScreen     state={state} dispatch={dispatch} />; break;
    case "wizard":   body = <WizardScreen   state={state} dispatch={dispatch} />; break;
    case "triage":   body = <TriageScreen   state={state} dispatch={dispatch} />; break;
    case "protocol": body = <ProtocolScreen state={state} dispatch={dispatch} />; break;
    case "alert":    body = <AlertScreen    state={state} dispatch={dispatch} />; break;
    case "handover": body = <HandoverScreen state={state} dispatch={dispatch} />; break;
    case "library":  body = <LibraryScreen  state={state} dispatch={dispatch} />; break;
    case "log":      body = <LogScreen      state={state} dispatch={dispatch} />; break;
    case "victims":  body = <VictimsScreen  state={state} dispatch={dispatch} />; break;
    case "about":    body = <AboutScreen    state={state} dispatch={dispatch} />; break;
    case "language": body = <LanguageScreen state={state} dispatch={dispatch} />; break;
    case "volunteer-register": body = <VolunteerRegisterScreen state={state} dispatch={dispatch} />; break;
    default:         body = <HomeScreen     state={state} dispatch={dispatch} />;
  }

  return (
    <div className="min-h-screen flex flex-col">
      <Header state={state} dispatch={dispatch} title={titleByScreen[state.screen]} />
      <main className="flex-1">{body}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <StrictMode><ErrorBoundary><App /></ErrorBoundary></StrictMode>
);
</script>
<script>
(function () {
  function showError(title, detail) {
    document.getElementById("root").innerHTML =
      "<pre style='padding:2rem;color:#b91c1c;white-space:pre-wrap;font-family:monospace;'>" +
      title + "\n\n" + detail + "</pre>";
  }
  try {
    var src = document.getElementById("app-source").textContent;
    var compiled = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]],
      filename: "app.jsx"
    }).code;
    try {
      var script = document.createElement("script");
      script.textContent = compiled;
      document.body.appendChild(script);
    } catch (runErr) {
      showError("Runtime error while executing compiled app:", (runErr && runErr.stack) || runErr);
    }
  } catch (compileErr) {
    showError("Babel compile error:", (compileErr && compileErr.stack) || compileErr);
  }
})();
</script>
</body>
</html>
