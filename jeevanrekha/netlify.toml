# Jeevanरेखा — Netlify configuration.
# Static site, no build step. Drag-and-drop or CLI deploy both work.

[build]
  publish = "."
  # No build command — files are already production-ready.

# --- Headers ----------------------------------------------------------------
# Service worker, app shell and runtime config must NEVER be cached at the edge
# or in the browser, otherwise users get stuck on an old version of the app.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest needs the right MIME type for "Add to Home Screen" to detect the PWA.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# Icon can be cached for an hour.
[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "image/svg+xml"

# Basic security headers — cheap to add and quiet most browser warnings.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(self), camera=(self)"

# --- SPA-style fallback -----------------------------------------------------
# Real files (sw.js, icon.svg, logos.html, config.js, manifest) take precedence
# because Netlify resolves static files BEFORE applying this redirect.
# This only catches deep-link 404s so shared URLs always land on the app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
